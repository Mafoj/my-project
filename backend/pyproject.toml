[tool.ruff]
line-length = 100
target-version = "py311"
[tool.ruff.lint]
select = ["E","F","I","UP","B","SIM","RUF"]

[tool.ruff.lint.flake8-bugbear]
# B008 flags function calls in argument defaults. For FastAPI, `Depends(...)` in
# a default IS the documented idiom -- this is a false positive, not a code smell.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path"]
[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

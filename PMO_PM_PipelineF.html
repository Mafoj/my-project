const TABS=[
  {id:'1',label:'Project List'},
  {id:'2',label:'PM View'},
  {id:'7',label:'PM View New'},
  {id:'3',label:'Statistics'},
  {id:'4',label:'Project Quality'},
  {id:'5',label:'Allocation'},
  {id:'tl',label:'Timeline'},
  {id:'6',label:'Versioning'},
];

function App(){
  const[projectData,setProjectData]=useState(null);
  const[allocData,setAllocData]=useState(null);
  const[activeTab,setActiveTab]=useState('1');
  const[sharedFilters,setSharedFilters]=useState(()=>{
    try{const r=localStorage.getItem('iqspmo_filters_shared');return r?{...mkFilters(),...JSON.parse(r)}:mkFilters();}catch{return mkFilters();}
  });
  const setSharedFiltersPersisted=useCallback(upd=>{
    setSharedFilters(prev=>{
      const next=typeof upd==='function'?upd(prev):upd;
      try{localStorage.setItem('iqspmo_filters_shared',JSON.stringify(next));}catch{}
      return next;
    });
  },[]);
  const[filtersSync,setFiltersSync]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('iqspmo_filters_sync')||'false');}catch{return false;}
  });
  const toggleFiltersSync=useCallback(()=>{
    setFiltersSync(v=>{const n=!v;try{localStorage.setItem('iqspmo_filters_sync',JSON.stringify(n));}catch{}return n;});
  },[]);
  const[chartReady,setChartReady]=useState(false);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const[loadedAt,setLoadedAt]=useState(null);
  const[loadedFileName,setLoadedFileName]=useState(null);
  const[folderHandle,setFolderHandle]=useState(null);
  const[folderPerm,setFolderPerm]=useState('none'); // none | saved | granted | denied
  const[folderBusy,setFolderBusy]=useState(false);
  const[folderMsg,setFolderMsg]=useState(null);
  const[loadedFromFolder,setLoadedFromFolder]=useState(false);
  const[loadedFromServer,setLoadedFromServer]=useState(false);
  const[serverChecked,setServerChecked]=useState(false);
  const[serverBusy,setServerBusy]=useState(location.protocol==='http:'||location.protocol==='https:');
  const newFileInp=useRef(null);

  useEffect(()=>{
    if(window.Chart){setChartReady(true);return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    s.onload=()=>setChartReady(true);
    s.onerror=()=>console.warn('Chart.js failed to load');
    document.head.appendChild(s);
  },[]);

  const buColorMap=useMemo(()=>projectData?buildBUColorMap(projectData):{},[projectData]);
  const towerColorMap=useMemo(()=>projectData?buildTowerColorMap(projectData):{},[projectData]);

  const handleMain=useCallback(async file=>{
    setLoading(true);setError(null);
    try{
      const wb=await readWb(file);
      setProjectData(parseMain(wb));
      setAllocData(null);
      setLoadedAt(new Date());
      setLoadedFileName(file.name);
      setActiveTab('1');
    }catch(e){setError('Failed to parse file: '+e.message);}
    setLoading(false);
  },[]);

  const handleAlloc=useCallback(async file=>{
    setLoading(true);setError(null);
    try{const wb=await readWb(file);setAllocData(parseAlloc(wb));}
    catch(e){setError('Failed to parse allocation file: '+e.message);}
    setLoading(false);
  },[]);

  // ─── Auto-load on mount ───────────────────────────────────────────────────────
  // 1) Same-origin fetch first (works when this HTML is hosted, e.g. on SharePoint —
  //    every viewer gets the same data with zero setup). 2) Falls back to a
  //    previously connected local folder, if this page was opened as a local file.
  useEffect(()=>{
    (async()=>{
      if(location.protocol==='http:'||location.protocol==='https:'){
        try{
          const file=await fetchSiblingExport();
          if(file){
            await handleMain(file);
            setLoadedFromServer(true);
            setServerChecked(true);setServerBusy(false);
            return;
          }
        }catch{/* fall through to local folder restore below */}
        setServerChecked(true);setServerBusy(false);
      }
      let h;try{h=await loadFolderHandle();}catch{return;}
      if(!h)return;
      setFolderHandle(h);
      try{
        const p=await h.queryPermission({mode:'read'});
        if(p==='granted'){setFolderPerm('granted');loadFromFolder(h);}
        else setFolderPerm('saved');
      }catch{setFolderPerm('saved');}
    })();
  },[]);

  const loadFromFolder=useCallback(async dh=>{
    if(!dh)return;
    setFolderBusy(true);setFolderMsg(null);setError(null);
    try{
      const scanDir=await getScanDir(dh);
      const found=await findFileInFolder(scanDir,isPipelineFileName);
      if(!found){setFolderMsg('No pipeline export file found in the connected folder yet.');setFolderBusy(false);return;}
      await handleMain(found.file);
      setLoadedFromFolder(true);
      setFolderMsg(`Loaded "${found.name}" (modified ${new Date(found.file.lastModified).toLocaleString('de-DE')})`);
    }catch(e){setError('Could not read from folder: '+e.message);}
    setFolderBusy(false);
  },[handleMain]);

  const connectFolder=useCallback(async()=>{
    if(!('showDirectoryPicker'in window)){setError('Folder auto-load needs Chrome or Edge. Drop the file manually below instead.');return;}
    try{
      const h=await window.showDirectoryPicker({id:'pmoPipelineData',mode:'read'});
      setFolderHandle(h);setFolderPerm('granted');
      try{await saveFolderHandle(h);}catch{/* persistence is best-effort; the in-memory handle still works this session */}
      await loadFromFolder(h);
    }catch(e){if(e.name!=='AbortError')setError('Could not open folder: '+e.message);}
  },[loadFromFolder]);

  const restoreFolderAccess=useCallback(async()=>{
    if(!folderHandle)return;
    try{
      const p=await folderHandle.requestPermission({mode:'read'});
      if(p==='granted'){setFolderPerm('granted');await loadFromFolder(folderHandle);}
      else setFolderPerm('denied');
    }catch(e){setError('Could not get folder access: '+e.message);}
  },[folderHandle,loadFromFolder]);

  const disconnectFolder=useCallback(async()=>{
    await clearFolderHandle();setFolderHandle(null);setFolderPerm('none');setFolderMsg(null);setLoadedFromFolder(false);
  },[]);

  const recheckServer=useCallback(async()=>{
    setServerBusy(true);setError(null);
    try{
      const file=await fetchSiblingExport();
      if(file){await handleMain(file);setLoadedFromServer(true);}
    }catch(e){setError('Could not fetch from server: '+e.message);}
    setServerChecked(true);setServerBusy(false);
  },[handleMain]);

  const fmtTs=d=>{
    if(!d)return null;
    return d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  };

  return(
    <ChartReadyCtx.Provider value={chartReady}>
    <BUColorCtx.Provider value={buColorMap}>
    <TowerColorCtx.Provider value={towerColorMap}>
      <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
        <div className="header">
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <svg width="52" height="22" viewBox="0 0 52 22" fill="none">
              <rect width="52" height="22" rx="2" fill="#D40511"/>
              <text x="5" y="16" fontFamily="Arial Black,sans-serif" fontWeight="900" fontSize="14" fill="#FFCC00">DHL</text>
            </svg>
            <div>
              <h1>ISQ PM &amp; Project Pipeline <span style={{fontSize:'0.7rem',fontWeight:600,verticalAlign:'middle',background:'rgba(212,5,17,0.1)',color:'#D40511',border:'1px solid rgba(212,5,17,0.25)',borderRadius:4,padding:'2px 7px',letterSpacing:'0.02em'}}>v{CHANGELOG[0].version}</span></h1>
              {loadedAt&&(
                <div style={{fontSize:'0.72rem',color:'rgba(212,5,17,0.65)',marginTop:2}}>
                  Data loaded: {fmtTs(loadedAt)}
                  {loadedFileName&&<> — <strong>{loadedFileName}</strong></>}
                  {loadedFromServer&&' (shared, auto-loaded)'}
                  {loadedFromFolder&&' (local folder, auto-loaded)'}
                </div>
              )}
            </div>
          </div>
          {projectData&&(
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <span className="header-meta">{projectData.length} projects</span>
              {loadedFromServer&&(
                <button onClick={recheckServer} disabled={serverBusy}
                  style={{padding:'5px 12px',border:'1px solid rgba(212,5,17,0.4)',borderRadius:6,
                    background:'rgba(212,5,17,0.08)',color:'#D40511',cursor:serverBusy?'default':'pointer',
                    fontFamily:'Inter',fontSize:'0.8125rem',fontWeight:600,opacity:serverBusy?0.6:1}}>
                  {serverBusy?'Refreshing…':'\u{1F504} Refresh from server'}
                </button>
              )}
              {loadedFromFolder&&folderPerm==='granted'&&(
                <button onClick={()=>loadFromFolder(folderHandle)} disabled={folderBusy}
                  style={{padding:'5px 12px',border:'1px solid rgba(212,5,17,0.4)',borderRadius:6,
                    background:'rgba(212,5,17,0.08)',color:'#D40511',cursor:folderBusy?'default':'pointer',
                    fontFamily:'Inter',fontSize:'0.8125rem',fontWeight:600,opacity:folderBusy?0.6:1}}>
                  {folderBusy?'Refreshing…':'\u{1F504} Refresh from folder'}
                </button>
              )}
              <button onClick={()=>newFileInp.current&&newFileInp.current.click()}
                style={{padding:'5px 12px',border:'1px solid rgba(212,5,17,0.4)',borderRadius:6,
                  background:'rgba(212,5,17,0.08)',color:'#D40511',cursor:'pointer',
                  fontFamily:'Inter',fontSize:'0.8125rem',fontWeight:600}}>
                Load new file
              </button>
              <input ref={newFileInp} type="file" style={{display:'none'}} accept=".xlsx,.xls,.csv"
                onChange={e=>{if(e.target.files[0]){setLoadedFromFolder(false);setLoadedFromServer(false);handleMain(e.target.files[0]);}e.target.value='';}}/>
            </div>
          )}
        </div>

        {error&&(
          <div style={{background:'#fee2e2',color:'#991b1b',padding:'10px 24px',fontSize:'0.85rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>{error}</span>
            <button onClick={()=>setError(null)} style={{border:'none',background:'none',cursor:'pointer',color:'#991b1b',fontSize:'1.1rem'}}>×</button>
          </div>
        )}
        {loading&&(
          <div style={{background:'#fff8e6',color:'#D40511',padding:'10px 24px',fontSize:'0.85rem',fontWeight:500}}>&#9203; Loading…</div>
        )}

        {!projectData?(
          <div style={{maxWidth:580,margin:'72px auto',padding:'0 24px'}}>
            {(location.protocol==='http:'||location.protocol==='https:')&&(
              <div className="card" style={{marginBottom:18}}>
                <div className="section-title">Shared Data (everyone on this link)</div>
                {serverBusy&&<p style={{fontSize:'0.82rem',color:'#D40511'}}>&#9203; Checking for today's export at this URL…</p>}
                {!serverBusy&&serverChecked&&(
                  <>
                    <p style={{fontSize:'0.82rem',color:'#64748b',marginBottom:12,lineHeight:1.5}}>
                      No export file found next to this page yet (looked for {SERVER_FILE_CANDIDATES.join(', ')}). Once one is uploaded to this same folder, every viewer of this link sees it automatically — no setup needed.
                    </p>
                    <button className="ghost-btn" onClick={recheckServer}>&#128260; Check Again</button>
                  </>
                )}
              </div>
            )}
            <div className="card" style={{marginBottom:18}}>
              <div className="section-title">Auto-load from a local folder (this device only)</div>
              {folderPerm==='none'&&(
                <>
                  <p style={{fontSize:'0.82rem',color:'#64748b',marginBottom:12,lineHeight:1.5}}>
                    Connect the folder this dashboard file lives in — once granted, it auto-finds and loads the newest pipeline export placed there. Chrome/Edge only.
                  </p>
                  <button className="ghost-btn" onClick={connectFolder}>&#128193; Connect Data Folder</button>
                </>
              )}
              {folderPerm==='saved'&&(
                <>
                  <p style={{fontSize:'0.82rem',color:'#64748b',marginBottom:12,lineHeight:1.5}}>
                    A data folder was connected previously — the browser needs a quick re-confirmation each session.
                  </p>
                  <button className="ghost-btn" onClick={restoreFolderAccess}>&#128275; Restore Folder Access</button>
                  <button className="clear-btn" style={{marginLeft:8}} onClick={disconnectFolder}>Disconnect</button>
                </>
              )}
              {folderPerm==='granted'&&!folderBusy&&!folderMsg?.startsWith('Loaded')&&(
                <button className="ghost-btn" onClick={()=>loadFromFolder(folderHandle)}>&#128193; Scan Folder Again</button>
              )}
              {folderPerm==='denied'&&(
                <p style={{fontSize:'0.82rem',color:'#991b1b'}}>
                  Folder access was denied. <span style={{textDecoration:'underline',cursor:'pointer'}} onClick={connectFolder}>Reconnect</span>
                </p>
              )}
              {folderBusy&&<p style={{fontSize:'0.8rem',color:'#D40511',marginTop:10}}>&#9203; Scanning folder…</p>}
              {folderMsg&&!folderBusy&&<p style={{fontSize:'0.8rem',color:'#64748b',marginTop:10}}>{folderMsg}</p>}
            </div>
            <DropZone onFile={handleMain} label="…or drop the Pipeline Excel / CSV file here"/>
            <div style={{marginTop:16,display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              <a
                href="https://dpdhl.sharepoint.com/:x:/r/sites/PPDxDEV/Shared%20Documents/Exports_DoNotChange/PPD_PMO_PM_Pipeline_Export.csv"
                target="_blank" rel="noopener noreferrer"
                style={{display:'inline-flex',alignItems:'center',gap:8,padding:'9px 20px',
                  background:'#D40511',color:'white',borderRadius:8,textDecoration:'none',
                  fontFamily:'Inter',fontSize:'0.85rem',fontWeight:600,
                  boxShadow:'0 2px 6px rgba(212,5,17,0.35)',transition:'background 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#b0040e'}
                onMouseLeave={e=>e.currentTarget.style.background='#D40511'}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Open from SharePoint
              </a>
              <div style={{fontSize:'0.75rem',color:'#94a3b8',textAlign:'center',lineHeight:1.5}}>
                Opens the file in SharePoint → download it → drag it onto the zone above
              </div>
            </div>
          </div>
        ):(
          <>
            <div className="tabs-nav">
              {TABS.map(t=>(
                <button key={t.id} className={`tab-btn${activeTab===t.id?' active':''}`} onClick={()=>setActiveTab(t.id)}>
                  {t.label}
                </button>
              ))}
            </div>
            {activeTab==='1'&&<Tab1 data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='2'&&<Tab2 data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='7'&&<Tab2New data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='3'&&<Tab3 data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='4'&&<Tab4 data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='5'&&<Tab5 allocData={allocData} onUpload={handleAlloc}/>}
            {activeTab==='tl'&&<TabTimeline data={projectData} sharedFilters={sharedFilters} setSharedFilters={setSharedFiltersPersisted} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>}
            {activeTab==='6'&&<Tab7/>}
          </>
        )}
      </div>
    </TowerColorCtx.Provider>
    </BUColorCtx.Provider>
    </ChartReadyCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISQ PM &amp; Project Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--dhl-yellow:#FFCC00;--dhl-red:#D40511;--dhl-red-hover:#b0040e;--dhl-red-subtle:rgba(212,5,17,0.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh}
.header{background:var(--dhl-yellow);color:var(--dhl-red);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.header h1{font-size:1.375rem;font-weight:800;letter-spacing:-0.5px;color:var(--dhl-red);}
.header-meta{font-size:0.79rem;color:rgba(212,5,17,0.7);}
.card{background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.04);padding:20px;scroll-margin-top:60px;}
.section-title{font-size:0.9375rem;font-weight:700;color:var(--dhl-red);margin-bottom:14px;padding-left:10px;border-left:3px solid var(--dhl-yellow);}
.tabs-nav{background:white;border-bottom:2px solid var(--dhl-yellow);display:flex;padding:0 24px;overflow-x:auto;position:sticky;top:0;z-index:10;}
.tab-btn{padding:13px 18px;border:none;background:none;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:500;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s;margin-bottom:-2px;}
.tab-btn:hover{color:var(--dhl-red);}
.tab-btn.active{color:var(--dhl-red);border-bottom-color:var(--dhl-red);font-weight:700;}
.filter-bar{background:white;border-radius:12px;padding:14px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:130px;}
.filter-group label{font-size:0.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.4px;}
.filter-select{padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.8125rem;font-family:'Inter',sans-serif;color:#1e293b;background:#f8fafc;cursor:pointer;outline:none;}
.filter-select:focus{border-color:var(--dhl-red);box-shadow:0 0 0 2px var(--dhl-red-subtle);}
.table-wrap{overflow:auto;border-radius:8px;border:1px solid #e2e8f0;}
table{border-collapse:collapse;width:100%;font-size:0.8rem;}
thead{position:sticky;top:0;z-index:1;}
thead th{background:#f8fafc;padding:9px 11px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid var(--dhl-yellow);white-space:nowrap;font-size:0.75rem;}
thead th.r{text-align:right;}
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{color:var(--dhl-red);background:#fff8e6;}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background 0.1s;}
tbody tr:hover{background:#fffbeb;}
tbody td{padding:7px 11px;color:#1e293b;vertical-align:middle;}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums;}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:0.72rem;font-weight:600;color:white;white-space:nowrap;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;}
.kpi-card{background:white;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.08);display:flex;flex-direction:column;gap:4px;border-top:3px solid var(--dhl-yellow);}
.kpi-label{font-size:0.72rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.kpi-value{font-size:1.5rem;font-weight:700;color:#1e293b;line-height:1.2;}
.upload-zone{border:2px dashed #cbd5e1;border-radius:16px;padding:56px 40px;text-align:center;cursor:pointer;transition:all 0.2s;background:white;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--dhl-red);background:#fff8e6;}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:0.79rem;}
.hbar-label{min-width:100px;max-width:160px;color:#475569;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.hbar-track{flex:1;background:#f1f5f9;border-radius:4px;height:18px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.hbar-val{font-size:0.74rem;color:#475569;white-space:nowrap;min-width:55px;}
.progress-row{margin-bottom:9px;}
.progress-track{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.page{padding:20px 24px;display:flex;flex-direction:column;gap:18px;}
.ms-wrap{position:relative;}
.ms-btn{width:100%;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.8125rem;font-family:'Inter',sans-serif;color:#1e293b;background:#f8fafc;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:4px;outline:none;}
.ms-btn:focus{border-color:var(--dhl-red);box-shadow:0 0 0 2px var(--dhl-red-subtle);}
.ms-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:200;background:white;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.13);max-height:220px;overflow-y:auto;}
.ms-option{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:0.8rem;cursor:pointer;transition:background 0.1s;user-select:none;}
.ms-option:hover{background:#fffbeb;}
.ms-search{padding:6px 8px;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:white;}
.ms-search input{width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:4px 7px;font-size:0.79rem;font-family:'Inter',sans-serif;outline:none;}
.clear-btn{padding:6px 14px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;background:white;font-family:'Inter',sans-serif;font-size:0.8125rem;color:#475569;transition:all 0.15s;}
.clear-btn:hover{background:var(--dhl-yellow);border-color:var(--dhl-yellow);color:#1e293b;}
.count-chip{font-size:0.79rem;color:#64748b;padding:4px 10px;background:#f1f5f9;border-radius:20px;white-space:nowrap;}
.ghost-btn{padding:7px 14px;border:1px solid var(--dhl-red);border-radius:8px;cursor:pointer;background:white;font-family:'Inter',sans-serif;font-size:0.8125rem;color:var(--dhl-red);transition:all 0.15s;}
.ghost-btn:hover{background:var(--dhl-red);color:white;}
canvas{max-width:100%;}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 14px;font-size:0.8rem;color:#92400e;display:flex;align-items:flex-start;gap:8px;}
.alert-red{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:9px 14px;font-size:0.8rem;color:#991b1b;display:flex;align-items:flex-start;gap:8px;}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@media print{
  .tabs-nav,.filter-bar,.upload-zone,.ghost-btn,.clear-btn,.count-chip{display:none!important;}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid;}
  canvas{max-width:100%!important;}
  .page{padding:8px;gap:10px;}
  body{background:white;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback,createContext,useContext} = React;

// ─── Contexts ───────────────────────────────────────────────────────────────
const ChartReadyCtx = createContext(false);
const BUColorCtx    = createContext({});
const TowerColorCtx = createContext({});

// ─── Constants ──────────────────────────────────────────────────────────────
const BU_PALETTE    = ['#D40511','#e67e00','#8b5cf6','#1d4ed8','#10b981','#06b6d4','#ec4899','#84cc16','#475569','#f97316','#0ea5e9','#a16207'];
const TOWER_PALETTE = ['#D40511','#FFCC00','#1d4ed8','#10b981','#8b5cf6','#f97316','#06b6d4','#ec4899','#475569','#84cc16'];
const INTEXT_COLORS = ['#1d4ed8','#f97316','#8b5cf6','#10b981','#ef4444','#06b6d4'];

const PROB_BUCKETS = [
  {label:'Committed (≥75%)',  test:p=>p>=75,          color:'#10b981'},
  {label:'Probable (50–74%)', test:p=>p>=50&&p<75,   color:'#3b82f6'},
  {label:'Possible (25–49%)', test:p=>p>=25&&p<50,   color:'#f59e0b'},
  {label:'Speculative (<25%)',     test:p=>p>0&&p<25,     color:'#ef4444'},
];

const CLOSED_STATUSES = new Set(['Completed','Cancelled','Won','Lost']);

const buildColorMap = (data,key,palette) => {
  const vals=[...new Set(data.map(r=>String(r[key]||'').trim()).filter(Boolean))].sort();
  const m={};vals.forEach((v,i)=>{m[v]=palette[i%palette.length];});return m;
};
const buildBUColorMap    = data=>buildColorMap(data,'bu',BU_PALETTE);
const buildTowerColorMap = data=>buildColorMap(data,'tower',TOWER_PALETTE);

const STATUS_COLORS = {
  'Active':'#22c55e','Ongoing':'#22c55e','On Hold':'#f59e0b','Completed':'#3b82f6',
  'Cancelled':'#ef4444','Planning':'#8b5cf6','Pipeline':'#06b6d4','Initiation':'#f97316',
  'Won':'#10b981','Lost':'#f43f5e',
};
const STATUS_NORM = (()=>{
  const m={};Object.keys(STATUS_COLORS).forEach(k=>{m[k.toLowerCase()]=k;});
  m['canceled']='Cancelled';return m;
})();
const normStatus = s=>STATUS_NORM[String(s||'').trim().toLowerCase()]||String(s||'').trim();
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MKS    = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const EUR    = new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0});

function toNum(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return isNaN(v)?0:v;
  const s=String(v).trim().replace(/[€$£ \s%]/g,'').replace(/[''`]/g,'');
  if(!s)return 0;
  if(/^-?\d{1,3}(\.\d{3})+(,\d*)?$/.test(s))return parseFloat(s.replace(/\./g,'').replace(',','.'));
  if(/^-?\d{1,3}(,\d{3})+(\.\d*)?$/.test(s))return parseFloat(s.replace(/,/g,''));
  if(/^-?\d+(,\d+)$/.test(s))return parseFloat(s.replace(',','.'));
  return parseFloat(s)||0;
}
const fmtEur  = v=>{const n=toNum(v);return isNaN(n)?'':EUR.format(n);};
const fmtPct  = v=>{if(v==null||v==='')return '';const n=parseFloat(v);return isNaN(n)?'':(n<=1?n*100:n).toFixed(0)+'%';};
const fmtDate = v=>{
  if(!v)return '';
  if(typeof v==='number')return excelDate(v)||'';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  const us=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(us){
    const[,m,d,y]=us;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return s.substring(0,10);
};

function excelDate(s){
  if(!s||typeof s!=='number')return null;
  return new Date(Date.UTC(1899,11,30)+s*86400000).toISOString().split('T')[0];
}
function nk(s){return String(s||'').trim().replace(/\n/g,' ').replace(/\s+/g,' ').toLowerCase();}

// ─── Column maps ─────────────────────────────────────────────────────────────
const MAIN_MAP = {
  'project name':'projectName','project name (as in its1)':'projectNameITS',
  'tower':'tower','pc ownership':'pcOwnership','pm name':'pmName',
  'internal/ external':'intExt','internal/external':'intExt',
  'salesforce proposal # / bca #':'salesForce','#bso/io':'bsoIo',
  'project status':'projectStatus','start date':'startDate','end date':'endDate',
  'bu':'bu','value 2026':'value2026','probability [%]':'probability',
  'value weighted 2026':'valueWeighted2026','comments':'comments',
};
const ALLOC_MAP = {
  'initial ip tower':'tower','profit ownership':'profitOwnership',
  'pm depart':'pmDepart','pm name':'pmName','pm name secondary':'pmNameSecondary',
  'project name':'projectName','externality':'externality','order n.':'orderN',
  'notes':'notes','value':'value','project status':'projectStatus','probability':'probability',
  'is it in project list?':'inProjectList',
  ...Object.fromEntries(MKS.map((m,i)=>[MONTHS[i].toLowerCase(),m])),
  ...Object.fromEntries(MKS.map((m,i)=>[MONTHS[i].toLowerCase()+' ',m])),
};

// ─── Parsing ─────────────────────────────────────────────────────────────────
function parseSheet(ws,colMap){
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(rows.length<2)return[];
  const headers=rows[0];const idx={};
  headers.forEach((h,i)=>{
    const k=nk(String(h));
    if(colMap[k]&&idx[colMap[k]]==null)idx[colMap[k]]=i;
    const k2=k.replace(/\s+$/,'');
    if(colMap[k2]&&idx[colMap[k2]]==null)idx[colMap[k2]]=i;
  });
  return rows.slice(1).filter(r=>r.some(c=>c!=='')).map(r=>{
    const obj={};
    for(const[key,i]of Object.entries(idx)){const v=r[i]??'';obj[key]=typeof v==='string'?v.trim():v;}
    return obj;
  });
}
function parseMain(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  return parseSheet(ws,MAIN_MAP).map(r=>({
    ...r,projectStatus:normStatus(r.projectStatus),
    startDate:fmtDate(r.startDate),endDate:fmtDate(r.endDate),
    _sy:fmtDate(r.startDate).substring(0,4),_ey:fmtDate(r.endDate).substring(0,4),
    _v:toNum(r.value2026),_vw:toNum(r.valueWeighted2026),
    _p:(v=>{const n=toNum(v);return n<=1&&n>0?n*100:n;})(r.probability),
  }));
}
function parseAlloc(wb){
  const name=wb.SheetNames.find(n=>/alloc/i.test(n))||wb.SheetNames[0];
  const ws=wb.Sheets[name];
  return parseSheet(ws,ALLOC_MAP).map(r=>({
    ...r,projectStatus:normStatus(r.projectStatus),
    _v:toNum(r.value),_p:(v=>{const n=toNum(v);return n<=1&&n>0?n*100:n;})(r.probability),
    ...Object.fromEntries(MKS.map(m=>[`_${m}`,toNum(r[m])])),
  }));
}
function readWb(file){
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=e=>{try{res(XLSX.read(e.target.result,{type:'array'}));}catch(err){rej(err);}};
    rd.onerror=rej;rd.readAsArrayBuffer(file);
  });
}

// ─── Folder auto-load (File System Access API) ───────────────────────────────
// Remembers a user-granted directory handle so the dashboard can re-scan its own
// folder for a fresh export file instead of requiring a manual drag-and-drop each time.
let _fsDb=null;
function getFsDb(){
  if(_fsDb)return _fsDb;
  return new Promise((res,rej)=>{
    const req=indexedDB.open('PMOPipelineFolder',1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('handles'))db.createObjectStore('handles',{keyPath:'id'});};
    req.onsuccess=e=>{_fsDb=e.target.result;res(_fsDb);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function saveFolderHandle(handle){
  const db=await getFsDb();
  return new Promise((res,rej)=>{const tx=db.transaction('handles','readwrite');tx.objectStore('handles').put({id:'dataFolder',handle});tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
}
async function loadFolderHandle(){
  const db=await getFsDb();
  return new Promise((res,rej)=>{const r=db.transaction('handles','readonly').objectStore('handles').get('dataFolder');r.onsuccess=e=>res(e.target.result?.handle||null);r.onerror=e=>rej(e.target.error);});
}
async function clearFolderHandle(){
  const db=await getFsDb();
  return new Promise((res,rej)=>{const tx=db.transaction('handles','readwrite');tx.objectStore('handles').delete('dataFolder');tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
}
// Matches the main pipeline export (e.g. "PPD_PMO_PM_Pipeline_Export.csv"); excludes allocation exports.
function isPipelineFileName(name){return /\.(xlsx|xls|csv)$/i.test(name)&&/pipeline|export/i.test(name)&&!/alloc/i.test(name);}
// Scans a directory handle for the most recently modified file matching `matchFn`.
async function findFileInFolder(dirHandle,matchFn){
  let best=null;
  for await(const[name,handle]of dirHandle){
    if(handle.kind!=='file'||!matchFn(name))continue;
    const file=await handle.getFile();
    if(!best||file.lastModified>best.file.lastModified)best={file,name};
  }
  return best;
}
// Prefer a "data" subfolder next to the connected folder, if one exists; otherwise scan the folder itself.
async function getScanDir(dirHandle){
  try{return await dirHandle.getDirectoryHandle('data',{create:false});}
  catch{return dirHandle;}
}

// ─── Same-origin auto-fetch ────────────────────────────────────────────────────
// Only works when this HTML file is itself opened over http/https (e.g. hosted on
// IIS/SharePoint) — not when opened as a local file://. Fetches using the browser's
// existing session, so every viewer sees the same data with zero per-person setup.
//
// Primary strategy: scan a "data/" subfolder next to this page via IIS Directory
// Browsing (must be enabled for that folder — IIS Manager: select the data folder
// → Directory Browsing → Enable, or add to web.config:
//   <system.webServer><directoryBrowse enabled="true" /></system.webServer>
// The export process can then drop a file with any name into data/ and this page
// picks up the newest one automatically — no filename needs to be agreed in advance.
//
// Fallback: same-folder fetch of a few known filenames (for setups where directory
// browsing isn't enabled, e.g. SharePoint).
const SERVER_FILE_CANDIDATES=['PPD_PMO_PM_Pipeline_Export.csv','PPD_PMO_PM_Pipeline_Export.xlsx','PPD_PMO_PM_Pipeline_Export.xls'];

async function fetchNewestFromDataFolder(){
  try{
    const dirUrl=new URL('data/',location.href);
    const resp=await fetch(dirUrl,{credentials:'same-origin',cache:'no-store'});
    if(!resp.ok)return null;
    const html=await resp.text();
    const doc=new DOMParser().parseFromString(html,'text/html');
    const candidates=[...doc.querySelectorAll('a[href]')]
      .map(a=>{try{return new URL(a.getAttribute('href'),dirUrl);}catch{return null;}})
      .filter(u=>u&&u.pathname.startsWith(dirUrl.pathname)&&isPipelineFileName(decodeURIComponent(u.pathname.split('/').pop())));
    if(!candidates.length)return null;

    let best=null;
    for(const url of candidates){
      try{
        const head=await fetch(url,{method:'HEAD',credentials:'same-origin',cache:'no-store'});
        if(!head.ok)continue;
        const lm=head.headers.get('last-modified');
        const t=lm?new Date(lm).getTime():0;
        if(!best||t>best.t)best={url,t};
      }catch{/* skip unreachable candidate */}
    }
    if(!best)return null;

    const fileResp=await fetch(best.url,{credentials:'same-origin',cache:'no-store'});
    if(!fileResp.ok)return null;
    const buf=await fileResp.arrayBuffer();
    const name=decodeURIComponent(best.url.pathname.split('/').pop());
    return new File([buf],name,{lastModified:best.t||Date.now()});
  }catch{return null;}
}

async function fetchSiblingExport(){
  if(location.protocol!=='http:'&&location.protocol!=='https:')return null;
  const fromFolder=await fetchNewestFromDataFolder();
  if(fromFolder)return fromFolder;
  for(const name of SERVER_FILE_CANDIDATES){
    try{
      const url=new URL(name,location.href);
      const resp=await fetch(url,{credentials:'same-origin',cache:'no-store'});
      if(!resp.ok)continue;
      const buf=await resp.arrayBuffer();
      return new File([buf],name,{lastModified:Date.now()});
    }catch{/* try next candidate */}
  }
  return null;
}

// ─── Filtering ───────────────────────────────────────────────────────────────
const mkFilters=()=>({search:'',searchITS:'',tower:[],pcOwnership:[],pmName:[],projectStatus:['Initiation','On Hold','Ongoing','Starting'],bu:[],intExt:[],bsoIo:[],sy:'',ey:'',probBuckets:[]});
function applyMain(data,f){
  const q=f.search?f.search.trim().toLowerCase():'';
  const qITS=f.searchITS?f.searchITS.trim().toLowerCase():'';
  return data.filter(r=>{
    if(q&&!String(r.projectName||'').toLowerCase().includes(q))return false;
    if(qITS&&!String(r.projectNameITS||'').toLowerCase().includes(qITS))return false;
    if(f.tower.length&&!f.tower.includes(String(r.tower||'')))return false;
    if(f.pcOwnership.length&&!f.pcOwnership.includes(String(r.pcOwnership||'')))return false;
    if(f.pmName.length&&!f.pmName.includes(String(r.pmName||'')))return false;
    if(f.projectStatus.length&&!f.projectStatus.includes(String(r.projectStatus||'')))return false;
    if(f.bu.length&&!f.bu.includes(String(r.bu||'')))return false;
    if(f.intExt.length&&!f.intExt.includes(String(r.intExt||'')))return false;
    if(f.bsoIo&&f.bsoIo.length&&!f.bsoIo.includes(String(r.bsoIo||'')))return false;
    if(f.probBuckets&&f.probBuckets.length){const b=PROB_BUCKETS.find(b=>b.test(r._p));if(!b||!f.probBuckets.includes(b.label))return false;}
    if(f.sy&&r._sy!==f.sy)return false;
    if(f.ey&&r._ey!==f.ey)return false;
    return true;
  });
}

// ─── Persisted filters hook ──────────────────────────────────────────────────
function usePersistedFilters(tabId,defaultFn=mkFilters){
  const key='iqspmo_filters_'+tabId;
  const[filters,_set]=useState(()=>{
    try{const raw=localStorage.getItem(key);if(!raw)return defaultFn();return{...defaultFn(),...JSON.parse(raw)};}
    catch{return defaultFn();}
  });
  const setFilters=useCallback(upd=>{
    _set(prev=>{
      const next=typeof upd==='function'?upd(prev):upd;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return[filters,setFilters];
}

// ─── Table sort hook ─────────────────────────────────────────────────────────
function useTableSort(initCol='',initDir='asc'){
  const[sort,setSort]=useState({col:initCol,dir:initDir});
  const toggle=col=>setSort(s=>({col,dir:s.col===col&&s.dir==='asc'?'desc':'asc'}));
  const sortRows=useCallback(rows=>{
    if(!sort.col)return rows;
    return[...rows].sort((a,b)=>{
      const av=a[sort.col]??'',bv=b[sort.col]??'';
      const isNum=typeof av==='number'||typeof bv==='number';
      const cmp=isNum?(Number(av)||0)-(Number(bv)||0):String(av).localeCompare(String(bv));
      return sort.dir==='asc'?cmp:-cmp;
    });
  },[sort]);
  return{sort,toggle,sortRows};
}

function SortTh({col,label,sort,onSort,className=''}){

      <span style={{marginLeft:3,opacity:active?1:0.3,fontSize:'0.6rem',color:active?'var(--dhl-red)':'inherit'}}>
        {active?(sort.dir==='asc'?'▲':'▼'):'⇅'}

  );
}

// ─── MultiSelect ─────────────────────────────────────────────────────────────
function MultiSelect({options,value,onChange}){
  const[open,setOpen]=useState(false);const[q,setQ]=useState('');const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  const flt=useMemo(()=>options.filter(o=>o.toLowerCase().includes(q.toLowerCase())),[options,q]);
  const toggle=o=>onChange(value.includes(o)?value.filter(v=>v!==o):[...value,o]);
  const lbl=value.length===0?'All':value.length===1?value[0]:`${value.length} selected`;
  return(
    <div className="ms-wrap" ref={ref}>
      <button className="ms-btn" onClick={()=>setOpen(o=>!o)}>

          {flt.map(o=>(

// ─── HBar ────────────────────────────────────────────────────────────────────
function HBar({data,color='#1d4ed8',fmt,limit=15,colorFn}){
  const rows=limit>0?data.slice(0,limit):data;
  const mx=Math.max(...rows.map(r=>r.value),1);
  return(
    <div>
      {rows.map((r,i)=>(
        <div key={i} className="hbar-row">
          <div className="hbar-label" title={r.label}>{r.label}</div>
          <div className="hbar-track"><div className="hbar-fill" style={{width:`${(r.value/mx)*100}%`,background:colorFn?colorFn(r.label):color}}/></div>
          <div className="hbar-val">{fmt?fmt(r.value):r.value}</div>
        </div>
      ))}
    </div>
  );
}

function grp(data,key,val=()=>1){
  const m={};
  data.forEach(r=>{const k=String(r[key]||'').trim()||'(blank)';m[k]=(m[k]||0)+val(r);});
  return Object.entries(m).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
}

function grpWithVal(data,key){
  const m={};
  data.forEach(r=>{
    const k=String(r[key]||'').trim()||'(blank)';
    if(!m[k])m[k]={label:k,count:0,value:0};
    m[k].count++;m[k].value+=r._v;
  });
  return Object.values(m).sort((a,b)=>b.value-a.value);
}

// ─── ChartCanvas ─────────────────────────────────────────────────────────────
function ChartCanvas({type,data,options,plugins=[],height=300}){
  const ready=useContext(ChartReadyCtx);const ref=useRef(null);const inst=useRef(null);
  const dStr=JSON.stringify(data);const oStr=JSON.stringify(options);
  useEffect(()=>{
    if(!ready||!window.Chart||!ref.current)return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    inst.current=new window.Chart(ref.current,{type,data,options,plugins});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[ready,type,dStr,oStr]);
  return<canvas ref={ref} style={{width:'100%',height:height+'px'}}/>;
}

// ─── PipelineFunnel ──────────────────────────────────────────────────────────
function PipelineFunnel({data}){
  const total=data.length||1;
  const totalV=data.reduce((s,r)=>s+r._v,0)||1;
  const buckets=PROB_BUCKETS.map(b=>{
    const rows=data.filter(r=>b.test(r._p));
    return{...b,count:rows.length,value:rows.reduce((s,r)=>s+r._v,0)};
  });
  const noProb=data.filter(r=>!r._p).length;
  return(
    <div>
      {buckets.map(b=>(
        <div key={b.label} className="progress-row">
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.79rem',marginBottom:3}}>
            <span style={{fontWeight:600,color:b.color}}>{b.label}</span>
            <span style={{color:'#64748b'}}>{b.count} ({Math.round(b.count/total*100)}%) · {fmtEur(b.value)}</span>
          </div>
          <div className="progress-track"><div className="progress-fill" style={{width:`${b.value/totalV*100}%`,background:b.color}}/></div>
        </div>
      ))}
      {noProb>0&&<div style={{fontSize:'0.75rem',color:'#94a3b8',marginTop:6}}>{noProb} project{noProb!==1?'s':''} have no probability set</div>}
    </div>
  );
}

// ─── Portfolio Overview — palette & components (Tab3 / Statistics) ───────────
const CE={
  accent:'#3a4fb0',accentLight:'#8898d4',
  ongoing:'#1e9e5a',initiation:'#3e77d0',onHold:'#d98a12',starting:'#c9c6bd',
  textDark:'#1c1e26',textGrey:'#8a8987',border:'#e3e1db',track:'#f0eee9',hover:'#f2f0ea',
};
const CE_STATUS={
  'Ongoing':CE.ongoing,'Initiation':CE.initiation,'On Hold':CE.onHold,'Starting':CE.starting,
  'Completed':'#64748b','Cancelled':'#ef4444','Won':'#0ea5e9','Lost':'#94a3b8',
};
const CE_CARD={background:'white',borderRadius:10,border:'1px solid '+CE.border,
  padding:'16px 20px',boxShadow:'0 1px 3px rgba(0,0,0,.06)'};

function DimPanel({data,allData,dimKey,title,sortBy,filterValue=[],onFilterChange}){
  const groups=useMemo(()=>{
    // seed all known keys from full dataset so rows never disappear
    const m={};
    (allData||data).forEach(r=>{
      const k=String(r[dimKey]||'').trim();if(!k)return;
      if(!m[k])m[k]={label:k,count:0,value:0};
    });
    // fill counts/values from cross-filtered data
    data.forEach(r=>{
      const k=String(r[dimKey]||'').trim();if(!k||!m[k])return;
      m[k].count++;m[k].value+=r._v;
    });
    const vals=Object.values(m).sort((a,b)=>sortBy==='value'?b.value-a.value:b.count-a.count);
    const thresh=15;
    if(vals.length<=thresh)return{rows:vals,other:null};
    const main=vals.slice(0,thresh-1);
    const rest=vals.slice(thresh-1);
    const other={label:'other',count:rest.reduce((s,r)=>s+r.count,0),value:rest.reduce((s,r)=>s+r.value,0),isOther:true};
    return{rows:main,other};
  },[data,allData,dimKey,sortBy]);
  const allRows=[...groups.rows,...(groups.other?[groups.other]:[])];
  const metricFn=g=>sortBy==='value'?g.value:g.count;
  const maxM=Math.max(...allRows.map(metricFn),1);
  const hasFilter=filterValue.length>0;
  const handleClick=useCallback(g=>{
    if(!onFilterChange)return;
    if(g.isOther){onFilterChange([]);return;}
    const sel=filterValue.includes(g.label)
      ?filterValue.filter(v=>v!==g.label)
      :[...filterValue,g.label];
    onFilterChange(sel);
  },[filterValue,onFilterChange]);
  return(
    <div style={CE_CARD}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:CE.textDark}}>{title}</span>
          {hasFilter&&(
            <button onClick={()=>onFilterChange([])}
              style={{fontSize:'0.7rem',color:CE.accent,border:`1px solid ${CE.accent}`,
                borderRadius:4,padding:'1px 7px',background:'white',cursor:'pointer',whiteSpace:'nowrap'}}>
              ✕ {filterValue.length} selected
            </button>
          )}
        </div>
        <span style={{fontSize:11,color:CE.textGrey}}>sorted by {sortBy==='value'?'value':'projects'}</span>
      </div>
      {allRows.map(g=>{
        const isActive=!g.isOther&&filterValue.includes(g.label);
        const isMuted=hasFilter&&!isActive;
        const bgBase=isActive?'#eef0f9':'transparent';
        const bgHover=isActive?'#e2e6f5':CE.hover;
        return(
          <div key={g.label}
            onClick={()=>handleClick(g)}
            style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,
              padding:'2px 4px',borderRadius:5,
              cursor:onFilterChange?'pointer':'default',
              background:bgBase,
              outline:isActive?`1.5px solid ${CE.accent}`:'none',
              transition:'background .1s'}}
            onMouseEnter={e=>e.currentTarget.style.background=bgHover}
            onMouseLeave={e=>e.currentTarget.style.background=bgBase}>
            <div style={{minWidth:110,maxWidth:130,fontSize:12,
              color:isMuted?'#c0bdb8':g.isOther?CE.textGrey:CE.textDark,
              fontStyle:g.isOther?'italic':'normal',
              fontWeight:isActive?600:400,
              textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
              title={g.label}>{g.label}</div>
            <div style={{flex:1,height:16,background:CE.track,borderRadius:3,overflow:'hidden'}}>

function StatusSegPanel({data,byValue,title,filterValue=[],onFilterChange}){
  const groups=useMemo(()=>{
    const m={};
    data.forEach(r=>{
      const k=String(r.projectStatus||'').trim()||'Other';
      if(!m[k])m[k]={label:k,count:0,value:0};
      m[k].count++;m[k].value+=r._v;
    });
    return Object.values(m).sort((a,b)=>b[byValue?'value':'count']-a[byValue?'value':'count']);
  },[data,byValue]);
  const totalCount=data.length||1;
  const totalValue=data.reduce((s,r)=>s+r._v,0)||1;
  const total=byValue?totalValue:totalCount;
  const hasFilter=filterValue.length>0;
  const handleClick=useCallback(label=>{
    if(!onFilterChange)return;
    const sel=filterValue.includes(label)?filterValue.filter(v=>v!==label):[...filterValue,label];
    onFilterChange(sel);
  },[filterValue,onFilterChange]);
  return(
    <div style={CE_CARD}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:CE.textDark}}>{title}</span>
          {hasFilter&&<button onClick={()=>onFilterChange([])}
            style={{fontSize:'0.7rem',color:CE.accent,border:`1px solid ${CE.accent}`,
              borderRadius:4,padding:'1px 7px',background:'white',cursor:'pointer',whiteSpace:'nowrap'}}>
            ✕ {filterValue.length} selected
          </button>}
        </div>
        <span style={{fontSize:11,color:CE.textGrey,fontVariantNumeric:'tabular-nums'}}>
          {byValue?fmtEur(totalValue):totalCount+' total'}
        </span>
      </div>
      <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',marginBottom:14}}>
        {groups.map(g=>{
          const pct=(byValue?g.value:g.count)/total*100;
          const isActive=filterValue.includes(g.label);
          const isMuted=hasFilter&&!isActive;
          return pct>0?<div key={g.label} onClick={()=>handleClick(g.label)}
            style={{width:`${pct}%`,background:CE_STATUS[g.label]||'#94a3b8',
              opacity:isMuted?0.28:1,cursor:onFilterChange?'pointer':'default',
              transition:'opacity 0.2s, width 0.4s ease'}} title={g.label}/>:null;
        })}
      </div>
      {groups.map(g=>{
        const v=byValue?g.value:g.count;
        const pct=Math.round(v/total*100);
        const isActive=filterValue.includes(g.label);
        const isMuted=hasFilter&&!isActive;
        const bgBase=isActive?'rgba(58,79,176,0.07)':'transparent';
        return(
          <div key={g.label} onClick={()=>handleClick(g.label)}
            style={{display:'flex',alignItems:'center',gap:8,marginBottom:7,fontSize:12,
              padding:'2px 4px',borderRadius:5,

              transition:'background .1s'}}
            onMouseEnter={e=>e.currentTarget.style.background=isActive?'rgba(58,79,176,0.12)':CE.hover}
            onMouseLeave={e=>e.currentTarget.style.background=bgBase}>
            <div style={{width:10,height:10,borderRadius:2,flexShrink:0,
              background:CE_STATUS[g.label]||'#94a3b8',opacity:isMuted?0.35:1}}/>

            <span style={{color:isMuted?'#c0bdb8':CE.textGrey,fontVariantNumeric:'tabular-nums'}}>
              {byValue?fmtEur(g.value):g.count} · {pct}%

function CePipelineFunnel({data,filterValue=[],onFilterChange}){
  const totalV=data.reduce((s,r)=>s+r._v,0)||1;
  const CE_PROB={'Committed (≥75%)':CE.ongoing,'Probable (50–74%)':CE.track,'Possible (25–49%)':CE.track,'Speculative (<25%)':CE.onHold};
  const buckets=PROB_BUCKETS.map(b=>{
    const rows=data.filter(r=>b.test(r._p));
    return{...b,count:rows.length,value:rows.reduce((s,r)=>s+r._v,0),ceColor:CE_PROB[b.label]||b.color};
  });
  const noProb=data.filter(r=>!r._p).length;
  const hasFilter=filterValue.length>0;
  const handleClick=useCallback(label=>{
    if(!onFilterChange)return;
    const sel=filterValue.includes(label)?filterValue.filter(v=>v!==label):[...filterValue,label];
    onFilterChange(sel);
  },[filterValue,onFilterChange]);
  return(
    <div>
      {buckets.map(b=>{
        const isActive=filterValue.includes(b.label);

        return(

              <span style={{fontWeight:isActive?700:600,color:isMuted?'#c0bdb8':CE.textDark}}>{b.label}</span>
              <span style={{color:isMuted?'#c0bdb8':CE.textGrey,fontVariantNumeric:'tabular-nums'}}>{b.count} proj · {fmtEur(b.value)}</span>

    if(!r.endDate)return false;

  const missBU=useMemo(()=>filtered.filter(r=>!String(r.bu||'').trim()),[filtered]);
  const missProb=useMemo(()=>filtered.filter(r=>!r._p),[filtered]);

  const agoData=useMemo(()=>[
    {n:1,label:'1 year ago',   yearLabel:String(CY-1),ref:yr1Ref,rows:filtered.filter(r=>{const y=parseInt(r._sy);return !isNaN(y)&&y===CY-1;})},

  const sortES=useTableSort('endDate','asc');
  const sortSR=useTableSort('startDate','desc');
  const sortMF=useTableSort('projectName','asc');
  const sortMO=useTableSort('projectName','asc');
  const sortMB=useTableSort('projectName','asc');
  const sortMP=useTableSort('projectName','asc');
  const sortA1=useTableSort('pmName','asc');
  const sortA2=useTableSort('pmName','asc');
  const sortA3=useTableSort('pmName','asc');
  const agoSorts=[sortA1,sortA2,sortA3];

  const buList=useMemo(()=>[...new Set(onHold.map(r=>r.bu||'(blank)'))].sort(),[onHold]);
  const yrList=useMemo(()=>[...new Set(onHold.map(r=>r._sy||'(blank)'))].sort(),[onHold]);
  const hc=(yr,bu)=>onHold.filter(r=>(r._sy||'(blank)')===yr&&(r.bu||'(blank)')===bu).length;
  const maxH=useMemo(()=>Math.max(...yrList.flatMap(y=>buList.map(b=>hc(y,b))),1),[yrList,buList,onHold]);

  const days=r=>r.endDate?Math.round((new Date(r.endDate)-today)/86400000):null;
  const dc=d=>d==null?'':d<0?'#7c3aed':d<=14?'#ef4444':d<=60?'#f59e0b':'';

  return(
    <div className="page">
      <FilterBar data={data} filters={f} setFilters={setF} nFiltered={filtered.length} nTotal={data.length} filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>
      {/* KPI grouped strip */}
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:16}}>
        {/* Row 1 — Portfolio & quality check */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#1c1e26',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6,fontFamily:'system-ui,Helvetica Neue,sans-serif'}}>Portfolio &amp; quality check</div>
          <div style={{background:'#fff',border:'1px solid #e3e1db',borderRadius:10,boxShadow:'0 1px 3px rgba(0,0,0,.06)',display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
            <KpiCell label="Total Projects"      value={filtered.length}      color="#1c1e26"  dotColor="#b0aea8"/>
            <KpiCell label="Overdue"             value={overdue.length}       color="#c0392b"  onClick={scrollTo(overdueRef)}   title="Jump to Overdue detail"/>
            <KpiCell label="Missing Funding"     value={missFunding.length}   color="#c0392b"  onClick={scrollTo(missFundRef)}  title="Jump to Missing Funding detail"/>
            <KpiCell label="On Hold"             value={onHold.length}        color="#d98a12"  onClick={scrollTo(onHoldRef)}    title="Jump to On Hold detail"/>
            <KpiCell label="Missing Probability" value={missProb.length}      color="#d98a12"  onClick={scrollTo(missProbRef)}  title="Jump to Missing Probability detail"/>
            <KpiCell label="Missing BU"          value={missBU.length}        color="#d98a12"  onClick={scrollTo(missBURef)}    title="Jump to Missing BU detail"/>
            <KpiCell label="Missing Order #"     value={missOrder.length}     color="#1c1e26"  dotColor="#b0aea8" onClick={scrollTo(missOrderRef)} title="Jump to Missing Order detail" isLast={true}/>
          </div>
        </div>
        {/* Row 2 — Timing */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#1c1e26',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6,fontFamily:'system-ui,Helvetica Neue,sans-serif'}}>Timing</div>
          <div style={{background:'#fff',border:'1px solid #e3e1db',borderRadius:10,boxShadow:'0 1px 3px rgba(0,0,0,.06)',display:'grid',gridTemplateColumns:'repeat(5,1fr)'}}>
            <KpiCell label="Ending ≤60 Days"     value={endingSoon.length}    color="#d98a12"  onClick={scrollTo(endingSoonRef)} title="Jump to Ending Soon detail"/>
            <KpiCell label="Started Last 60 Days" value={startedRecently.length} color="#1e9e5a" onClick={scrollTo(startedRef)} title="Jump to Started Recently detail"/>
            {agoData.map(({label,rows,ref},i)=>(
              <KpiCell key={i} label={`Started ${label}`} value={rows.length} color="#1c1e26" onClick={scrollTo(ref)} title={`Jump to ${label} detail`} isLast={i===agoData.length-1}/>
            ))}
          </div>
        </div>
      </div>

      {/* On Hold Heatmap */}
      <div className="card" ref={onHoldRef}>
        <div className="section-title">On Hold — Start Year × BU</div>
        {yrList.length>0?(
          <>
            <div style={{overflowX:'auto',marginBottom:20}}>
              <table style={{borderCollapse:'collapse',fontSize:'0.79rem'}}>
                <thead><tr>
                  <th style={{padding:'6px 10px',background:'#f8fafc',border:'1px solid #e2e8f0'}}>Year</th>
                  {buList.map(b=><th key={b} style={{padding:'6px 10px',background:'#f8fafc',border:'1px solid #e2e8f0',whiteSpace:'nowrap'}}>{b}</th>)}
                  <th style={{padding:'6px 10px',background:'#f8fafc',border:'1px solid #e2e8f0'}}>Total</th>
                </tr></thead>
                <tbody>
                  {yrList.map(yr=>{
                    const rt=buList.reduce((s,b)=>s+hc(yr,b),0);
                    return(
                      <tr key={yr}>
                        <td style={{padding:'6px 10px',border:'1px solid #e2e8f0',fontWeight:600}}>{yr}</td>
                        {buList.map(b=>{
                          const v=hc(yr,b);const int=v/maxH;
                          return<td key={b} style={{padding:'6px 10px',border:'1px solid #e2e8f0',textAlign:'center',
                            background:v>0?`rgba(245,158,11,${Math.min(0.15+int*0.75,0.9)})`:'',
                            color:v>0?'#78350f':''}}>{v||''}</td>;
                        })}
                        <td style={{padding:'6px 10px',border:'1px solid #e2e8f0',textAlign:'center',fontWeight:600}}>{rt}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="section-title">On Hold Detail</div>
            <div className="table-wrap" style={{maxHeight:320}}>
              <table>
                <thead><tr>
                  {[{label:'Status',key:'projectStatus'},{label:'Project Name',key:'projectName'},
                    {label:'PM Name',key:'pmName'},{label:'Int/Ext',key:'intExt'},
                    {label:'BU',key:'bu'},{label:'Start Date',key:'startDate'},
                    {label:'End Date',key:'endDate'},{label:'Value 2026',key:'_v',align:'r'},
                    {label:'Comments',key:'comments'}].map(c=>(
                    <SortTh key={c.key} col={c.key} label={c.label} sort={sortOH.sort} onSort={sortOH.toggle} className={c.align||''}/>
                  ))}
                </tr></thead>
                <tbody>
                  {sortOH.sortRows([...onHold]).map((r,i)=>(
                    <tr key={i}>
                      <td><Badge s={r.projectStatus}/></td>
                      <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.intExt}</td>
                      <td>{r.bu}</td><td>{r.startDate}</td><td>{r.endDate}</td>
                      <td className="r">{r._v?fmtEur(r._v):''}</td>
                      <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.comments}>{r.comments}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        ):<div style={{color:'#94a3b8'}}>No on-hold projects</div>}
      </div>

      {/* Overdue */}
      <div className="card" ref={overdueRef}>
        <div className="section-title" style={{color:'#dc2626'}}>Overdue — Past End Date, Still Active ({overdue.length})</div>
        {overdue.length>0?(
          <>
            <div className="alert-red" style={{marginBottom:12}}>
              <span>&#9888;</span>
              <span>These projects have passed their planned end date but are not yet closed. Review with the responsible PM.</span>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr>
                  {[{label:'End Date',key:'endDate'},{label:'Days Overdue',key:'_daysOD'},
                    {label:'Project Name',key:'projectName'},{label:'PM Name',key:'pmName'},
                    {label:'BU',key:'bu'},{label:'Tower',key:'tower'},
                    {label:'Status',key:'projectStatus'},{label:'Value 2026',key:'_v',align:'r'}].map(c=>(
                    <SortTh key={c.key} col={c.key} label={c.label} sort={sortOD.sort} onSort={sortOD.toggle} className={c.align||''}/>
                  ))}
                </tr></thead>
                <tbody>
                  {sortOD.sortRows(overdue.map(r=>{
                    const d=r.endDate?Math.round((today-new Date(r.endDate))/86400000):0;
                    return{...r,_daysOD:d};
                  })).map((r,i)=>(
                    <tr key={i}>
                      <td style={{color:'#dc2626',fontWeight:600}}>{r.endDate}</td>
                      <td style={{color:'#dc2626',fontWeight:600}}>{r._daysOD}d overdue</td>
                      <td>{r.projectName}</td><td>{r.pmName}</td>
                      <td>{r.bu}</td><td>{r.tower}</td>
                      <td><Badge s={r.projectStatus}/></td>
                      <td className="r">{r._v?fmtEur(r._v):''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        ):<div style={{color:'#94a3b8'}}>No overdue projects — all active projects are within their planned end date.</div>}
      </div>

      {/* Ending Soon */}
      <div className="card" ref={endingSoonRef}>
        <div className="section-title">Ending in Next 60 Days ({endingSoon.length})</div>
        {endingSoon.length>0?(
          <div className="table-wrap">
            <table>
              <thead><tr>
                {[{label:'End Date',key:'endDate'},{label:'Days Left',key:'_daysLeft'},
                  {label:'Project Name',key:'projectName'},{label:'PM Name',key:'pmName'},
                  {label:'BU',key:'bu'},{label:'Status',key:'projectStatus'}].map(c=>(
                  <SortTh key={c.key} col={c.key} label={c.label} sort={sortES.sort} onSort={sortES.toggle}/>
                ))}
              </tr></thead>
              <tbody>
                {sortES.sortRows(endingSoon.map(r=>{
                  const d=days(r);return{...r,_daysLeft:d!=null?d:9999};
                })).map((r,i)=>{
                  const d=days(r);const c=dc(d);
                  return<tr key={i}>
                    <td style={{color:c,fontWeight:c?600:400}}>{r.endDate}</td>
                    <td style={{color:c,fontWeight:c?600:400}}>{d!=null?`${d}d${d<=0?' [OVERDUE]':' remaining'}`:''}</td>
                    <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.bu}</td>
                    <td><Badge s={r.projectStatus}/></td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        ):<div style={{color:'#94a3b8'}}>None</div>}
      </div>

      {/* Started Last 60 Days */}
      <div className="card" ref={startedRef}>
        <div className="section-title">Started in Last 60 Days ({startedRecently.length})</div>
        {startedRecently.length>0?(
          <div className="table-wrap">
            <table>
              <thead><tr>
                {[{label:'Start Date',key:'startDate'},{label:'Days Ago',key:'_daysAgo'},
                  {label:'Project Name',key:'projectName'},{label:'ITS1 Name',key:'projectNameITS'},
                  {label:'PM Name',key:'pmName'},{label:'BU',key:'bu'},
                  {label:'Tower',key:'tower'},{label:'Status',key:'projectStatus'},
                  {label:'Value 2026',key:'_v',align:'r'}].map(c=>(
                  <SortTh key={c.key} col={c.key} label={c.label} sort={sortSR.sort} onSort={sortSR.toggle} className={c.align||''}/>
                ))}
              </tr></thead>
              <tbody>
                {sortSR.sortRows(startedRecently.map(r=>{
                  const dAgo=r.startDate?Math.round((today-new Date(r.startDate))/86400000):0;
                  return{...r,_daysAgo:dAgo};
                })).map((r,i)=>(
                  <tr key={i}>
                    <td style={{color:'#10b981',fontWeight:600}}>{r.startDate}</td>
                    <td style={{color:'#10b981',fontWeight:600}}>{r._daysAgo}d ago</td>
                    <td>{r.projectName}</td>
                    <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.projectNameITS}>{r.projectNameITS}</td>
                    <td>{r.pmName}</td><td>{r.bu}</td><td>{r.tower}</td>
                    <td><Badge s={r.projectStatus}/></td>
                    <td className="r">{r._v?fmtEur(r._v):''}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ):<div style={{color:'#94a3b8'}}>None</div>}
      </div>

      {/* Missing Funding */}
      <div className="card" ref={missFundRef}>
        <div className="section-title">Missing Funding ({missFunding.length})</div>
        {missFunding.length>0?(
          <div className="table-wrap" style={{maxHeight:280}}>
            <table>
              <thead><tr>
                {[{label:'Value 2026',key:'_v',align:'r'},{label:'Weighted Value',key:'_vw',align:'r'},
                  {label:'Project Name',key:'projectName'},{label:'PM Name',key:'pmName'},
                  {label:'BU',key:'bu'},{label:'Status',key:'projectStatus'},
                  {label:'Start',key:'startDate'},{label:'End',key:'endDate'}].map(c=>(
                  <SortTh key={c.key} col={c.key} label={c.label} sort={sortMF.sort} onSort={sortMF.toggle} className={c.align||''}/>
                ))}
              </tr></thead>
              <tbody>
                {sortMF.sortRows([...missFunding]).map((r,i)=>(
                  <tr key={i}>
                    <td className="r" style={{color:'#94a3b8',fontStyle:'italic'}}>—</td>
                    <td className="r" style={{color:'#94a3b8',fontStyle:'italic'}}>—</td>
                    <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.bu}</td>
                    <td><Badge s={r.projectStatus}/></td><td>{r.startDate}</td><td>{r.endDate}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ):<div style={{color:'#94a3b8'}}>None</div>}
      </div>

      {/* Missing Order */}
      <div className="card" ref={missOrderRef}>
        <div className="section-title">Missing Order / SalesForce ({missOrder.length})</div>
        {missOrder.length>0?(
          <div className="table-wrap" style={{maxHeight:280}}>
            <table>
              <thead><tr>
                {[{label:'BSO/IO #',key:'bsoIo'},{label:'SalesForce #',key:'salesForce'},
                  {label:'Project Name',key:'projectName'},{label:'PM Name',key:'pmName'},
                  {label:'BU',key:'bu'},{label:'Status',key:'projectStatus'},
                  {label:'Start',key:'startDate'},{label:'End',key:'endDate'}].map(c=>(
                  <SortTh key={c.key} col={c.key} label={c.label} sort={sortMO.sort} onSort={sortMO.toggle}/>
                ))}
              </tr></thead>
              <tbody>
                {sortMO.sortRows([...missOrder]).map((r,i)=>(
                  <tr key={i}>
                    <td style={{color:'#94a3b8',fontStyle:'italic'}}>{r.bsoIo||'—'}</td>
                    <td style={{color:'#94a3b8',fontStyle:'italic'}}>{r.salesForce||'—'}</td>
                    <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.bu}</td>
                    <td><Badge s={r.projectStatus}/></td><td>{r.startDate}</td><td>{r.endDate}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ):<div style={{color:'#94a3b8'}}>None</div>}
      </div>

      {/* Missing BU */}
      <div className="card" ref={missBURef}>
        <div className="section-title">Missing Business Unit ({missBU.length})</div>
        {missBU.length>0?(
          <>
            <div className="alert-warn" style={{marginBottom:12}}>
              <span>&#9888;</span>
              <span>These projects have no BU assigned — their value is excluded from every "by BU" chart and rollup on this dashboard.</span>
            </div>
            <div className="table-wrap" style={{maxHeight:280}}>
              <table>
                <thead><tr>
                  {[{label:'BU',key:'bu'},{label:'Project Name',key:'projectName'},
                    {label:'PM Name',key:'pmName'},{label:'Tower',key:'tower'},
                    {label:'Status',key:'projectStatus'},{label:'Start',key:'startDate'},
                    {label:'End',key:'endDate'},{label:'Value 2026',key:'_v',align:'r'}].map(c=>(
                    <SortTh key={c.key} col={c.key} label={c.label} sort={sortMB.sort} onSort={sortMB.toggle} className={c.align||''}/>
                  ))}
                </tr></thead>
                <tbody>
                  {sortMB.sortRows([...missBU]).map((r,i)=>(
                    <tr key={i}>
                      <td style={{color:'#94a3b8',fontStyle:'italic'}}>—</td>
                      <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.tower}</td>
                      <td><Badge s={r.projectStatus}/></td><td>{r.startDate}</td><td>{r.endDate}</td>
                      <td className="r">{r._v?fmtEur(r._v):''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        ):<div style={{color:'#94a3b8'}}>None</div>}
      </div>

      {/* Missing Probability */}
      <div className="card" ref={missProbRef}>
        <div className="section-title">Missing Probability ({missProb.length})</div>
        {missProb.length>0?(
          <>
            <div className="alert-warn" style={{marginBottom:12}}>
              <span>&#9888;</span>
              <span>These projects have no probability set — they are excluded from the Pipeline by Probability chart and the Weighted Value calculation may be inaccurate.</span>
            </div>
            <div className="table-wrap" style={{maxHeight:280}}>
              <table>
                <thead><tr>
                  {[{label:'Probability',key:'_p',align:'r'},{label:'Project Name',key:'projectName'},
                    {label:'PM Name',key:'pmName'},{label:'BU',key:'bu'},
                    {label:'Tower',key:'tower'},{label:'Status',key:'projectStatus'},
                    {label:'Start',key:'startDate'},{label:'End',key:'endDate'},
                    {label:'Value 2026',key:'_v',align:'r'}].map(c=>(
                    <SortTh key={c.key} col={c.key} label={c.label} sort={sortMP.sort} onSort={sortMP.toggle} className={c.align||''}/>
                  ))}
                </tr></thead>
                <tbody>
                  {sortMP.sortRows([...missProb]).map((r,i)=>(
                    <tr key={i}>
                      <td className="r" style={{color:'#94a3b8',fontStyle:'italic'}}>—</td>
                      <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.bu}</td><td>{r.tower}</td>
                      <td><Badge s={r.projectStatus}/></td>
                      <td>{r.startDate}</td><td>{r.endDate}</td>
                      <td className="r">{r._v?fmtEur(r._v):''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        ):<div style={{color:'#94a3b8'}}>All projects have a probability set — no action required.</div>}
      </div>

      {/* Started X years ago */}
      {agoData.map(({label,yearLabel,ref,rows},idx)=>{
        const agoS=agoSorts[idx];
        return(
          <div key={label} className="card" ref={ref}>
            <div className="section-title">Started {label} — {yearLabel} ({rows.length})</div>
            {rows.length>0?(
              <div className="table-wrap" style={{maxHeight:320}}>
                <table>
                  <thead><tr>
                    {[{label:'Start Year',key:'_sy'},{label:'Project Name',key:'projectName'},
                      {label:'PM Name',key:'pmName'},{label:'BU',key:'bu'},
                      {label:'Tower',key:'tower'},{label:'Status',key:'projectStatus'},
                      {label:'End Date',key:'endDate'},{label:'Value 2026',key:'_v',align:'r'}].map(c=>(
                      <SortTh key={c.key} col={c.key} label={c.label} sort={agoS.sort} onSort={agoS.toggle} className={c.align||''}/>
                    ))}
                  </tr></thead>
                  <tbody>
                    {agoS.sortRows([...rows]).map((r,i)=>(
                      <tr key={i}>
                        <td style={{fontWeight:600,color:'#475569'}}>{r._sy||'—'}</td>
                        <td>{r.projectName}</td><td>{r.pmName}</td><td>{r.bu}</td><td>{r.tower}</td>
                        <td><Badge s={r.projectStatus}/></td>
                        <td>{r.endDate}</td>
                        <td className="r">{r._v?fmtEur(r._v):''}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ):<div style={{color:'#94a3b8'}}>None</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── Tab 5: Allocation ───────────────────────────────────────────────────────
const mkFilters5=()=>({tower:[],pmName:[],projectStatus:[],externality:[]});
function Tab5({allocData,onUpload}){
  const[f,setF]=usePersistedFilters('5',mkFilters5);
  const inp=useRef(null);
  const twMap=useContext(TowerColorCtx);
  const twCfn=tw=>twMap[String(tw||'').trim()]||'#94a3b8';
  const{sort,toggle,sortRows}=useTableSort('pmName','asc');

  const opts=useMemo(()=>{
    if(!allocData)return{};
    const u=k=>[...new Set(allocData.map(r=>String(r[k]||'')).filter(Boolean))].sort();
    return{tower:u('tower'),pmName:u('pmName'),projectStatus:u('projectStatus'),externality:u('externality')};
  },[allocData]);

  const filtered=useMemo(()=>{
    if(!allocData)return[];
    return allocData.filter(r=>{
      if(f.tower.length&&!f.tower.includes(String(r.tower||'')))return false;
      if(f.pmName.length&&!f.pmName.includes(String(r.pmName||'')))return false;
      if(f.projectStatus.length&&!f.projectStatus.includes(String(r.projectStatus||'')))return false;
      if(f.externality.length&&!f.externality.includes(String(r.externality||'')))return false;
      return true;
    });
  },[allocData,f]);

  if(!allocData){
    return<div className="page"><DropZone onFile={onUpload} label="Drop the Allocation Excel file here"/></div>;
  }

  const tv=filtered.reduce((s,r)=>s+r._v,0);
  const uPMs=new Set(filtered.map(r=>r.pmName).filter(Boolean)).size;
  const avgP=filtered.length?filtered.reduce((s,r)=>s+r._p,0)/filtered.length:0;
  const mTotals=MKS.map((mk,i)=>({label:MONTHS[i],value:filtered.reduce((s,r)=>s+r[`_${mk}`],0)}));
  const pmList=[...new Set(filtered.map(r=>r.pmName).filter(Boolean))].sort();
  const pmMo=(pm,mk)=>filtered.filter(r=>r.pmName===pm).reduce((s,r)=>s+r[`_${mk}`],0);
  const allV=pmList.flatMap(pm=>MKS.map(mk=>pmMo(pm,mk)));
  const maxMV=Math.max(...allV,1);
  const set=(k,v)=>setF(fv=>({...fv,[k]:v}));

  return(
    <div className="page">
      <div style={{display:'flex',flexWrap:'wrap',gap:12,alignItems:'flex-end',background:'white',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        {[['tower','Tower'],['pmName','PM Name'],['projectStatus','Status'],['externality','Externality']].map(([k,l])=>(
          <div key={k} className="filter-group">
            <label>{l}</label>
            <MultiSelect options={opts[k]||[]} value={f[k]} onChange={v=>set(k,v)}/>
          </div>
        ))}
        <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
          <button className="clear-btn" onClick={()=>setF(mkFilters5())}>Clear</button>
          <span className="count-chip">{filtered.length} / {allocData.length}</span>
        </div>
        <div style={{marginLeft:'auto',alignSelf:'flex-end'}}>
          <button className="ghost-btn" onClick={()=>inp.current&&inp.current.click()}>Change allocation file</button>
          <input ref={inp} type="file" style={{display:'none'}} accept=".xlsx,.xls,.csv"
            onChange={e=>{if(e.target.files[0])onUpload(e.target.files[0]);e.target.value='';}}/>
        </div>
      </div>

// ─── Shared data hooks ────────────────────────────────────────────────────────
function usePMData(data){
  return useMemo(()=>{
    const m={};
    data.forEach(r=>{
      const pm=String(r.pmName||'').trim();if(!pm)return;
      if(!m[pm])m[pm]={pm,count:0,value:0,its1:new Set()};
      m[pm].count++;m[pm].value+=r._v;
      const its=String(r.projectNameITS||'').trim();if(its)m[pm].its1.add(its);
    });
    return Object.values(m).map(({its1,...rest})=>({...rest,its1Count:its1.size}));
  },[data]);
}

function useITS1Data(data){
  return useMemo(()=>{
    const today=new Date();
    const m={};
    data.forEach(r=>{
      const its=String(r.projectNameITS||'').trim();if(!its)return;
      if(!m[its])m[its]={its,count:0,value:0,onHold:0,endingSoon:0,pmSet:new Set()};
      m[its].count++;m[its].value+=r._v;
      if(r.projectStatus==='On Hold')m[its].onHold++;
      if(r.endDate){
        const d=Math.round((new Date(r.endDate)-today)/86400000);
        if(d>=0&&d<=60)m[its].endingSoon++;
      }
      const pm=String(r.pmName||'').trim();if(pm)m[its].pmSet.add(pm);
    });
    return Object.values(m).map(({pmSet,...rest})=>({...rest,pmCount:pmSet.size}));
  },[data]);
}

function BadgeBarChart({pmData,activePM,onClickPM}){
  const[sortBy,setSortBy]=useState('value');
  const sorted=useMemo(()=>[...pmData].sort((a,b)=>sortBy==='count'?b.count-a.count:sortBy==='its1'?b.its1Count-a.its1Count:b.value-a.value),[pmData,sortBy]);
  const maxV=Math.max(...sorted.map(d=>d.value),1);
  const btnStyle=key=>({
    padding:'4px 12px',borderRadius:6,border:'1px solid',cursor:'pointer',
    fontFamily:'Inter',fontSize:'0.75rem',fontWeight:600,transition:'all 0.15s',
    background:sortBy===key?'#D40511':'white',color:sortBy===key?'white':'#D40511',borderColor:'#D40511',
  });
  const totalV=pmData.reduce((s,d)=>s+d.value,0)||1;
  const topPM=sorted.length>0?sorted.reduce((best,d)=>d.value>best.value?d:best,sorted[0]):null;

    <div>

  const[sortBy,setSortBy]=useState('value');

  const sorted=useMemo(()=>[...pmData].sort((a,b)=>sortBy==='count'?b.count-a.count:sortBy==='its1'?b.its1Count-a.its1Count:b.value-a.value),[pmData,sortBy]);
  const maxV=Math.max(...sorted.map(d=>d.value),1);
  const segStyle=key=>({
    padding:'4px 12px',borderRadius:6,border:'1px solid',cursor:'pointer',

            <div style={{width:22,height:22,borderRadius:6,background:'#f2f0ea',color:'#8a8578',

// ─── Timeline tab ─────────────────────────────────────────────────────────────
function usePMGroups(data){
  return useMemo(()=>{
    const m={};
    data.forEach(r=>{
      const pm=String(r.pmName||'').trim();if(!pm)return;
      if(!m[pm])m[pm]=[];
      m[pm].push(r);
    });
    return Object.entries(m)
      .map(([pm,rows])=>({pm,rows:[...rows].sort((a,b)=>(a.startDate||'9999').localeCompare(b.startDate||'9999'))}))
      .sort((a,b)=>a.pm.localeCompare(b.pm));
  },[data]);
}

function TabTimeline({data,sharedFilters,setSharedFilters,filtersSync,toggleFiltersSync}){
  const[localF,setLocalF]=usePersistedFilters('tl');
  const f=filtersSync?sharedFilters:localF;
  const setF=filtersSync?setSharedFilters:setLocalF;
  const filtered=useMemo(()=>applyMain(data,f),[data,f]);
  const pmGroups=usePMGroups(filtered);

  const today=useMemo(()=>new Date(),[]);
  const year=today.getFullYear();
  const yearStartMs=useMemo(()=>Date.UTC(year,0,1),[year]);
  const totalDays=useMemo(()=>Math.round((Date.UTC(year,11,31)-yearStartMs)/86400000)+1,[year,yearStartMs]);
  const numWeeks=Math.ceil(totalDays/7);
  const yearEndMs=yearStartMs+(totalDays-1)*86400000;

  const monthMarks=useMemo(()=>{
    let acc=0;
    return MONTHS.map((m,i)=>{
      const pct=acc/totalDays*100;
      acc+=new Date(Date.UTC(year,i+1,0)).getUTCDate();
      return{label:m,pct};
    });
  },[year,totalDays]);

  const todayPct=today.getFullYear()===year?(Date.UTC(year,today.getMonth(),today.getDate())-yearStartMs)/86400000/totalDays*100:null;

  const barFor=useCallback(r=>{
    if(!r.startDate&&!r.endDate)return null;
    let s=r.startDate?Date.parse(r.startDate+'T00:00:00Z'):yearStartMs;
    let e=r.endDate?Date.parse(r.endDate+'T00:00:00Z'):yearEndMs;
    if(isNaN(s)||isNaN(e)||e<yearStartMs||s>yearEndMs)return null;
    if(s<yearStartMs)s=yearStartMs;
    if(e>yearEndMs)e=yearEndMs;
    const leftPct=(s-yearStartMs)/86400000/totalDays*100;
    const widthPct=Math.max(((e-s)/86400000+1)/totalDays*100,0.6);
    return{leftPct,widthPct};
  },[yearStartMs,yearEndMs,totalDays]);

  const usedStatuses=useMemo(()=>[...new Set(filtered.map(r=>r.projectStatus).filter(Boolean))].sort(),[filtered]);

  return(
    <div className="page">
      <FilterBar data={data} filters={f} setFilters={setF} nFiltered={filtered.length} nTotal={data.length} showBsoIo filtersSync={filtersSync} toggleFiltersSync={toggleFiltersSync}/>
      <div className="card">
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <div className="section-title" style={{margin:0}}>Timeline — {year}</div>
          <div style={{display:'flex',gap:12,fontSize:'0.6875rem',color:'rgba(0,0,0,.45)',alignItems:'center',flexWrap:'wrap'}}>
            {usedStatuses.map(s=>(
              <span key={s} style={{display:'inline-flex',alignItems:'center',gap:4}}>
                <span style={{display:'inline-block',width:7,height:7,borderRadius:9999,background:STATUS_COLORS[s]||'#94a3b8'}}/>{s}
              </span>
            ))}
          </div>
        </div>

        <div style={{display:'flex'}}>
          <div style={{width:240,flexShrink:0}}/>
          <div style={{flex:1,position:'relative',height:20}}>
            {monthMarks.map(m=>(
              <div key={m.label} style={{position:'absolute',left:`${m.pct}%`,top:0,height:'100%',
                fontSize:'0.65rem',color:'#94a3b8',fontWeight:600,borderLeft:'1px solid #e2e8f0',paddingLeft:4}}>
                {m.label}
              </div>
            ))}
          </div>
        </div>

        {pmGroups.length===0&&<div style={{color:'#94a3b8',fontSize:'0.85rem',padding:'12px 0'}}>No projects match the current filters.</div>}

        {pmGroups.map(({pm,rows})=>(
          <div key={pm} style={{marginTop:16}}>
            <div style={{fontSize:'0.8125rem',fontWeight:700,color:'#1e293b',marginBottom:6,
              paddingBottom:4,borderBottom:'1px solid #e2e8f0'}}>
              {pm} <span style={{fontWeight:400,color:'#94a3b8'}}>({rows.length} project{rows.length!==1?'s':''})</span>
            </div>
            {rows.map((r,i)=>{
              const bar=barFor(r);
              return(
                <div key={i} style={{display:'flex',alignItems:'center',padding:'4px 0'}}>
                  <div style={{width:240,flexShrink:0,paddingRight:10,fontSize:'0.75rem',color:'#475569',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.projectName}>
                    {r.projectName||'—'}
                  </div>
                  <div style={{flex:1,position:'relative',height:18,borderRadius:4,
                    background:`repeating-linear-gradient(to right, rgba(0,0,0,.05) 0, rgba(0,0,0,.05) 1px, transparent 1px, transparent ${100/numWeeks}%)`}}>
                    {todayPct!=null&&<div style={{position:'absolute',left:`${todayPct}%`,top:-2,bottom:-2,width:1,background:'#D40511',zIndex:2}}/>}
                    {bar?(
                      <div title={`${r.startDate||'?'} → ${r.endDate||'?'}`}
                        style={{position:'absolute',left:`${bar.leftPct}%`,width:`${bar.widthPct}%`,
                          top:3,height:12,borderRadius:3,background:STATUS_COLORS[r.projectStatus]||'#94a3b8'}}/>
                    ):(
                      <div style={{position:'absolute',left:8,top:0,height:'100%',display:'flex',alignItems:'center',
                        fontSize:'0.68rem',color:'#cbd5e1'}}>outside {year}</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function Tab7(){

# Apache reverse proxy. TLS terminates here; uvicorn listens only on 127.0.0.1.
<VirtualHost *:443>
    ServerName pmo-pipeline.intranet.dhl.com

    SSLEngine on
    SSLCertificateFile    /etc/pki/tls/certs/pmo-pipeline.crt
    SSLCertificateKeyFile /etc/pki/tls/private/pmo-pipeline.key

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog  /var/log/httpd/pmo-pipeline-error.log
    CustomLog /var/log/httpd/pmo-pipeline-access.log combined
</VirtualHost>

# Redirect plain HTTP.
<VirtualHost *:80>
    ServerName pmo-pipeline.intranet.dhl.com
    Redirect permanent / https://pmo-pipeline.intranet.dhl.com/
</VirtualHost>

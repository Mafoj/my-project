<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;padding:40px;background:#eef0f3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
.dv-oid{display:none}
.dv-olabel{display:none}
.dv-card{max-width:100%;background:#f4f5f7;border:1px solid rgba(0,0,0,.06);border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden;padding:22px 26px}
</style>
</head>
<body>
<div class="dv-opt" id="1c">
<div class="dv-olabel"><a class="dv-oid" href="#1c">1c</a>Donut summary + stacked-bar timeline</div>
<div class="dv-card" style="width:1560px;background:#fff">
  <div style="display:flex;gap:32px;align-items:center">
    <div style="flex:0 0 auto;display:flex;align-items:center;gap:18px;padding-right:26px;border-right:1px solid rgba(0,0,0,.08)">
      <div style="position:relative;width:88px;height:88px;border-radius:50%;background:conic-gradient(#c0392b 0 25.7%,#e88a3a 25.7% 33.8%,#c9832e 33.8% 35.1%,#d9a866 35.1% 37.8%,#e7e2df 37.8% 100%)">
        <div style="position:absolute;inset:12px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font:800 22px/1 system-ui;color:#111827;font-variant-numeric:tabular-nums">155</div>
          <div style="font:600 7.5px/1.2 system-ui;letter-spacing:.03em;color:#9aa1ac">PROJECTS</div>
        </div>
      </div>
      <div>
        <div style="font:700 10.5px/1 system-ui;letter-spacing:.08em;color:#9aa1ac;margin-bottom:10px">QUALITY CHECK</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:#c0392b;display:inline-block"></span><span style="font:700 13px/1 system-ui;color:#111827;font-variant-numeric:tabular-nums">19</span><span style="font:500 10px/1 system-ui;color:#9aa1ac">OVERDUE</span></div>
          <div style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:#e88a3a;display:inline-block"></span><span style="font:700 13px/1 system-ui;color:#111827;font-variant-numeric:tabular-nums">42</span><span style="font:500 10px/1 system-ui;color:#9aa1ac">MISSING FUNDING</span></div>
        </div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:14px">
      <div style="font:700 10.5px/1 system-ui;letter-spacing:.08em;color:#9aa1ac">OTHER FLAGS</div>
      <div style="display:flex;gap:26px">
        <div><div style="font:800 20px/1 system-ui;color:#c9832e;font-variant-numeric:tabular-nums">6</div><div style="font:600 9px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:5px">ON HOLD</div></div>
        <div><div style="font:800 20px/1 system-ui;color:#c9832e;font-variant-numeric:tabular-nums">1</div><div style="font:600 9px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:5px">MISSING PROBABILITY</div></div>
        <div><div style="font:800 20px/1 system-ui;color:#c9832e;font-variant-numeric:tabular-nums">2</div><div style="font:600 9px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:5px">MISSING BU</div></div>
        <div><div style="font:800 20px/1 system-ui;color:#111827;font-variant-numeric:tabular-nums">4</div><div style="font:600 9px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:5px">MISSING ORDER #</div></div>
      </div>
    </div>
  </div>
  <div style="height:1px;background:rgba(0,0,0,.07);margin:20px 0"></div>
  <div style="font:700 10.5px/1 system-ui;letter-spacing:.08em;color:#9aa1ac;margin-bottom:12px">TIMING — 70 TRACKED PROJECTS</div>
  <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;background:#f0f0f1">
    <div style="width:21.4%;background:#c9832e"></div>
    <div style="width:14.3%;background:#2f7a52"></div>
    <div style="width:54.3%;background:#111827"></div>
    <div style="width:7.1%;background:#5b6472"></div>
    <div style="width:2.9%;background:#9aa1ac"></div>
  </div>
  <div style="display:flex;margin-top:12px">
    <div style="width:21.4%"><div style="font:800 16px/1 system-ui;color:#c9832e;font-variant-numeric:tabular-nums">15</div><div style="font:600 8.5px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:4px">ENDING ≤60D</div></div>
    <div style="width:14.3%"><div style="font:800 16px/1 system-ui;color:#2f7a52;font-variant-numeric:tabular-nums">10</div><div style="font:600 8.5px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:4px">STARTED ≤60D</div></div>
    <div style="width:54.3%"><div style="font:800 16px/1 system-ui;color:#111827;font-variant-numeric:tabular-nums">38</div><div style="font:600 8.5px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:4px">1 YEAR AGO</div></div>
    <div style="width:7.1%"><div style="font:800 16px/1 system-ui;color:#5b6472;font-variant-numeric:tabular-nums">5</div><div style="font:600 8.5px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:4px">2 YEARS AGO</div></div>
    <div style="width:2.9%"><div style="font:800 16px/1 system-ui;color:#9aa1ac;font-variant-numeric:tabular-nums">2</div><div style="font:600 8.5px/1.3 system-ui;letter-spacing:.03em;color:#9aa1ac;margin-top:4px">3+ YEARS</div></div>
  </div>
</div>
</div>

</body>
</html>
